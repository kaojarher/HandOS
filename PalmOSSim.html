<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Palm OS 擬真彩色模擬器 (桌面全螢幕大字版)</title>
    <style>
        /* Palm OS 5 彩色世代配色彩盤 */
        :root {
            --palm-bg: #dbe4ee;        /* 系統淡藍灰背景 */
            --palm-screen: #ffffff;    /* 主顯示區 */
            --palm-dark: #002244;      /* 深藍色文字 */
            --palm-header: #4a75a0;    /* 藍色標題列 */
            --palm-header-text: #ffffff;
            --palm-btn-bg: #e6ecf2;
            --palm-btn-border: #7aa0cd;
        }

        * {
            box-sizing: border-box;
            font-family: "Segoe UI", "Microsoft JhengHei", sans-serif;
            color: var(--palm-dark);
        }

        body {
            background-color: #22222b;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            width: 100vw;
            overflow: hidden;
        }

        /* 滿版 PDA 外殼：移除邊距，直接撐滿整個瀏覽器視窗 */
        .pda-body {
            background: linear-gradient(135deg, #8a95a5, #505a69);
            width: 100vw;
            height: 100vh;
            padding: 15px; /* 僅保留微幅外框感 */
            box-shadow: inset 0 0 20px rgba(0,0,0,0.8);
            display: flex;
            flex-direction: column;
        }

        /* 液晶螢幕區域：完美填滿外殼，大字體優化 */
        .pda-screen {
            background-color: var(--palm-bg);
            border: 6px solid #222;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            flex: 1; /* 自動撐滿全螢幕 */
            position: relative;
            font-size: 18px; /* 全域字體加大 */
        }

        /* 頂部系統狀態欄 - 加大 */
        .top-bar {
            background-color: var(--palm-header);
            color: var(--palm-header-text);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 20px;
            font-weight: bold;
            font-size: 18px;
            border-bottom: 3px solid var(--palm-dark);
            z-index: 10;
        }

        .top-bar span, .top-bar select {
            color: var(--palm-header-text);
        }

        .top-bar select {
            background: rgba(0,0,0,0.1);
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 4px;
            font-size: 16px;
            padding: 4px 8px;
            outline: none;
            cursor: pointer;
        }
        .top-bar select option {
            color: var(--palm-dark);
        }

        /* 核心內容容器 */
        .app-content {
            flex: 1;
            position: relative;
            background-color: var(--palm-screen);
            overflow: hidden;
        }

        /* ==========================================
           經典桌面系統 (Launcher View) - 寬螢幕圖示加大
           ========================================== */
        .launcher-view {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 30px;
            padding: 35px;
            background-color: var(--palm-screen);
            height: 100%;
            overflow-y: auto;
            align-content: start;
        }

        .app-icon {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            cursor: pointer;
            padding: 15px;
            border-radius: 12px;
            transition: background 0.1s;
        }

        .app-icon:active {
            background-color: var(--palm-bg);
        }

        .icon-box {
            width: 80px;
            height: 80px;
            border-radius: 16px;
            background: linear-gradient(135deg, #ffffff, #dbe4ee);
            border: 3px solid var(--palm-header);
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 45px; /* 圖示表情加大 */
            margin-bottom: 10px;
        }

        .icon-label {
            font-size: 18px; /* 標籤文字加大 */
            font-weight: bold;
        }

        /* ==========================================
           全螢幕應用程式卡片 (App Screen View)
           ========================================== */
        .card-section {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: var(--palm-screen);
            display: none; 
            flex-direction: column;
            z-index: 5;
        }

        .card-section.active {
            display: flex; 
        }

        /* App 內部專屬標題列 - 加大 */
        h2.app-title {
            margin: 0;
            font-size: 22px;
            background-color: var(--palm-header);
            color: white;
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid rgba(0,0,0,0.1);
        }
        
        .home-btn {
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid white;
            color: white;
            border-radius: 6px;
            padding: 4px 12px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
        }

        .app-body {
            padding: 25px;
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            background-color: var(--palm-screen);
        }

        /* 下方硬體導覽快捷鍵區 - 加大提升點擊感 */
        .app-switcher {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
            background-color: #3a424d;
            padding: 12px;
            border-top: 3px solid #222;
        }

        .nav-btn {
            background: linear-gradient(to bottom, #ffffff, #cdcdcd);
            border: 2px solid #111;
            border-radius: 8px;
            padding: 12px 2px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            text-align: center;
        }

        .nav-btn.active {
            background: linear-gradient(to bottom, #4a75a0, #2a4d70);
            color: white;
        }

        /* 表單與各元件大字體樣式 */
        .input-group {
            display: flex;
            margin-bottom: 15px;
            gap: 10px;
        }

        input, textarea, select {
            font-size: 18px !important;
            padding: 10px !important;
            border-radius: 6px;
        }

        input, textarea {
            background-color: var(--palm-screen);
            border: 2px solid var(--palm-btn-border);
            outline: none;
        }

        input[type="text"], textarea {
            flex: 1;
        }

        button.action-btn {
            background: linear-gradient(to bottom, #ffffff, #e6ecf2);
            border: 2px solid var(--palm-btn-border);
            border-radius: 6px;
            padding: 10px 20px;
            cursor: pointer;
            font-size: 18px;
            font-weight: bold;
        }

        button.action-btn:active {
            background: var(--palm-header);
            color: white;
        }

        .list-item {
            background-color: #f9fbfd;
            border: 2px solid #e2e8f0;
            border-radius: 6px;
            margin-bottom: 10px;
            padding: 12px 18px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 18px;
        }

        .list-item span, .list-item b {
            font-size: 18px;
        }

        .delete-btn {
            background: #ffcccc;
            border: 2px solid #cc8888;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            color: #cc0000;
            padding: 4px 12px;
            font-size: 18px;
        }

        .todo-item.completed span {
            text-decoration: line-through;
            opacity: 0.5;
        }

        /* 複選框加大 */
        input[type="checkbox"] {
            width: 20px;
            height: 20px;
            cursor: pointer;
        }

        .sync-panel-content {
            font-size: 18px;
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .sync-block {
            background-color: #f0f4f8;
            border: 2px dashed var(--palm-header);
            padding: 20px;
            border-radius: 8px;
        }
        
        .sync-block strong {
            font-size: 19px;
        }
    </style>
</head>
<body>

<div class="pda-body">
    <div class="pda-screen">
        <div class="top-bar">
            <span id="palm-time">10:00 AM</span>
            <span id="palm-launcher-title" style="font-weight: bold; letter-spacing: 1px;">Palm OS® v5.4</span>
            <select id="category-select">
                <option>All</option>
                <option>Main</option>
                <option>System</option>
            </select>
        </div>

        <div class="app-content">
            
            <div id="palm-launcher" class="launcher-view">
                <div class="app-icon" onclick="openApp('cal')">
                    <div class="icon-box">📅</div>
                    <div class="icon-label">Date Book</div>
                </div>
                <div class="app-icon" onclick="openApp('addr')">
                    <div class="icon-box">👤</div>
                    <div class="icon-label">Address</div>
                </div>
                <div class="app-icon" onclick="openApp('todo')">
                    <div class="icon-box">✅</div>
                    <div class="icon-label">To Do List</div>
                </div>
                <div class="app-icon" onclick="openApp('memo')">
                    <div class="icon-box">📝</div>
                    <div class="icon-label">Memo Pad</div>
                </div>
                <div class="app-icon" onclick="openApp('sync')">
                    <div class="icon-box">🔄</div>
                    <div class="icon-label">HotSync</div>
                </div>
            </div>

            <div id="page-cal" class="card-section">
                <h2 class="app-title">
                    <span>📅 Date Book (行事曆)</span>
                    <button class="home-btn" onclick="goHome()">🏠 主畫面</button>
                </h2>
                <div class="app-body">
                    <div class="input-group">
                        <input type="time" id="cal-time" value="09:00">
                        <input type="text" id="cal-event" placeholder="新增行程...">
                        <button class="action-btn" onclick="addCal()">加入</button>
                    </div>
                    <div id="cal-list" style="overflow-y:auto; flex:1;"></div>
                </div>
            </div>

            <div id="page-addr" class="card-section">
                <h2 class="app-title">
                    <span>👤 Address Book (聯絡人)</span>
                    <button class="home-btn" onclick="goHome()">🏠 主畫面</button>
                </h2>
                <div class="app-body">
                    <div class="input-group" style="flex-direction: column; gap: 8px;">
                        <input type="text" id="addr-name" placeholder="姓名">
                        <input type="text" id="addr-phone" placeholder="電話">
                        <button class="action-btn" onclick="addAddr()">儲存聯絡人</button>
                    </div>
                    <div id="addr-list" style="overflow-y:auto; flex:1; margin-top:10px;"></div>
                </div>
            </div>

            <div id="page-todo" class="card-section">
                <h2 class="app-title">
                    <span>✅ To Do List (待辦事項)</span>
                    <button class="home-btn" onclick="goHome()">🏠 主畫面</button>
                </h2>
                <div class="app-body">
                    <div class="input-group">
                        <input type="text" id="todo-input" placeholder="需要做些什麼？">
                        <button class="action-btn" onclick="addTodo()">新增</button>
                    </div>
                    <div id="todo-list" style="overflow-y:auto; flex:1;"></div>
                </div>
            </div>

            <div id="page-memo" class="card-section">
                <h2 class="app-title">
                    <span>📝 Memo Pad (備忘錄)</span>
                    <button class="home-btn" onclick="goHome()">🏠 主畫面</button>
                </h2>
                <div class="app-body">
                    <div id="memo-index-view" style="display:flex; flex-direction:column; flex:1;">
                        <div class="input-group">
                            <button class="action-btn" onclick="showMemoEditor(-1)">+ 新增備忘錄</button>
                        </div>
                        <div id="memo-list" style="overflow-y:auto; flex:1;"></div>
                    </div>
                    <div id="memo-edit-view" style="display:none; flex-direction:column; flex:1;">
                        <textarea id="memo-text" style="flex:1; min-height:180px; margin-bottom:12px;" placeholder="在此輸入備忘錄內容..."></textarea>
                        <div style="display:flex; gap:15px;">
                            <button class="action-btn" onclick="saveMemo()">儲存</button>
                            <button class="action-btn" onclick="cancelMemo()">取消</button>
                        </div>
                    </div>
                </div>
            </div>

            <div id="page-sync" class="card-section">
                <h2 class="app-title">
                    <span>🔄 HotSync 同步中心</span>
                    <button class="home-btn" onclick="goHome()">🏠 主畫面</button>
                </h2>
                <div class="app-body sync-panel-content">
                    <div class="sync-block">
                        <strong style="display:block; margin-bottom:10px; border-bottom:2px solid #ccc; padding-bottom:4px;">💾 本地端硬碟備份</strong>
                        <button class="action-btn" onclick="exportLocal()">匯出備份 JSON</button>
                        <button class="action-btn" onclick="triggerImport()">匯入還原 JSON</button>
                        <input type="file" id="import-file" accept=".json" style="display:none;" onchange="importLocal(event)">
                    </div>
                    <div class="sync-block">
                        <strong style="display:block; margin-bottom:10px; border-bottom:2px solid #ccc; padding-bottom:4px;">☁️ Google Drive 雲端同步</strong>
                        <div style="margin-bottom: 12px;">
                            <button id="auth-btn" class="action-btn" onclick="handleAuth()">1. 授權登入</button>
                        </div>
                        <div style="display:flex; gap: 10px; margin-bottom: 12px;">
                            <button id="up-btn" class="action-btn" onclick="uploadToDrive()" disabled>雲端備份 ↑</button>
                            <button id="down-btn" class="action-btn" onclick="downloadFromDrive()" disabled>雲端還原 ↓</button>
                        </div>
                        <div id="sync-status" style="font-size: 16px; color: #555; font-weight: bold;">狀態: 未與雲端連線</div>
                    </div>
                </div>
            </div>

        </div>

        <div class="app-switcher" id="hardware-switcher">
            <div class="nav-btn" data-app="home" onclick="goHome()">🏠 桌面</div>
            <div class="nav-btn" data-app="cal" onclick="openApp('cal')">行事</div>
            <div class="nav-btn" data-app="addr" onclick="openApp('addr')">聯絡</div>
            <div class="nav-btn" data-app="todo" onclick="openApp('todo')">待辦</div>
            <div class="nav-btn" data-app="memo" onclick="openApp('memo')">備忘</div>
        </div>
    </div>
</div>

<script src="https://accounts.google.com/gsi/client" async defer></script>

<script>
    const CLIENT_ID = '375971288943-097rhbub5h2d06f1g5lqs60in6pofj22.apps.googleusercontent.com';
    const SCOPES = 'https://www.googleapis.com/auth/drive';
    
    let tokenClient;
    let accessToken = null;

    // 核心資料結構
    let db = {
        cal: JSON.parse(localStorage.getItem('palm_cal')) || [{time:"09:00", text:"桌面全螢幕大字版優化成功"}],
        addr: JSON.parse(localStorage.getItem('palm_addr')) || [{name:"李小明", phone:"0900-111222"}],
        todo: JSON.parse(localStorage.getItem('palm_todo')) || [{text:"享受寬敞無邊框的大文字介面", done: false}],
        memo: JSON.parse(localStorage.getItem('palm_memo')) || [{text:"針對桌上型電腦顯示器进行了100%滿版全畫面優化，所有系統按鈕、文字輸入框與列表皆大幅增加尺寸，提供長輩及高解析度螢幕最舒適的閱讀體驗！"}]
    };

    let currentMemoIndex = -1;

    // 系統時間與上方狀態更新
    function updateSystemTime() {
        const now = new Date();
        document.getElementById('palm-time').innerText = now.toLocaleTimeString('zh-TW', { hour: '2-digit', minute: '2-digit' });
    }
    setInterval(updateSystemTime, 1000);
    updateSystemTime();

    // 視窗與全螢幕切換管理邏輯
    function openApp(appId) {
        document.querySelectorAll('.card-section').forEach(card => card.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
        
        const targetApp = document.getElementById(`page-${appId}`);
        if (targetApp) {
            targetApp.classList.add('active');
            const activeBtn = document.querySelector(`.nav-btn[data-app="${appId}"]`);
            if (activeBtn) activeBtn.classList.add('active');
            if(appId === 'memo') cancelMemo();
        }
    }

    function goHome() {
        document.querySelectorAll('.card-section').forEach(card => card.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
        document.querySelector('.nav-btn[data-app="home"]').classList.add('active');
    }

    function saveToStorage(key) { localStorage.setItem(`palm_${key}`, JSON.stringify(db[key])); }
    function updateAllStorage() { saveToStorage('cal'); saveToStorage('addr'); saveToStorage('todo'); saveToStorage('memo'); }

    // --- 1. 行事曆功能 ---
    function addCal() {
        const time = document.getElementById('cal-time').value;
        const text = document.getElementById('cal-event').value.trim();
        if(!text) return;
        db.cal.push({time, text});
        db.cal.sort((a,b) => a.time.localeCompare(b.time));
        document.getElementById('cal-event').value = '';
        saveToStorage('cal');
        renderCal();
    }
    function delCal(index) { db.cal.splice(index, 1); saveToStorage('cal'); renderCal(); }
    function renderCal() {
        document.getElementById('cal-list').innerHTML = db.cal.map((item, i) => `
            <div class="list-item">
                <span><b style="color:var(--palm-header);">${item.time}</b> &nbsp; ${item.text}</span>
                <button class="delete-btn" onclick="delCal(${i})">×</button>
            </div>
        `).join('');
    }

    // --- 2. 聯絡人功能 ---
    function addAddr() {
        const name = document.getElementById('addr-name').value.trim();
        const phone = document.getElementById('addr-phone').value.trim();
        if(!name || !phone) return;
        db.addr.push({name, phone});
        document.getElementById('addr-name').value = '';
        document.getElementById('addr-phone').value = '';
        saveToStorage('addr');
        renderAddr();
    }
    function delAddr(index) { db.addr.splice(index, 1); saveToStorage('addr'); renderAddr(); }
    function renderAddr() {
        document.getElementById('addr-list').innerHTML = db.addr.map((item, i) => `
            <div class="list-item">
                <span>👤 <b>${item.name}</b> : ${item.phone}</span>
                <button class="delete-btn" onclick="delAddr(${i})">×</button>
            </div>
        `).join('');
    }

    // --- 3. 待辦事項功能 ---
    function addTodo() {
        const text = document.getElementById('todo-input').value.trim();
        if(!text) return;
        db.todo.push({text, done: false});
        document.getElementById('todo-input').value = '';
        saveToStorage('todo');
        renderTodo();
    }
    function toggleTodo(index) { db.todo[index].done = !db.todo[index].done; saveToStorage('todo'); renderTodo(); }
    function delTodo(index) { db.todo.splice(index, 1); saveToStorage('todo'); renderTodo(); }
    function renderTodo() {
        document.getElementById('todo-list').innerHTML = db.todo.map((item, i) => `
            <div class="list-item todo-item ${item.done ? 'completed' : ''}">
                <label style="display:flex; align-items:center; gap:10px; cursor:pointer;">
                    <input type="checkbox" ${item.done ? 'checked' : ''} onchange="toggleTodo(${i})">
                    <span>${item.text}</span>
                </label>
                <button class="delete-btn" onclick="delTodo(${i})">×</button>
            </div>
        `).join('');
    }

    // --- 4. 備忘錄功能 ---
    function showMemoEditor(index) {
        currentMemoIndex = index;
        document.getElementById('memo-index-view').style.display = 'none';
        document.getElementById('memo-edit-view').style.display = 'flex';
        document.getElementById('memo-text').value = index >= 0 ? db.memo[index].text : '';
    }
    function cancelMemo() {
        document.getElementById('memo-index-view').style.display = 'flex';
        document.getElementById('memo-edit-view').style.display = 'none';
    }
    function saveMemo() {
        const text = document.getElementById('memo-text').value.trim();
        if(!text) return cancelMemo();
        if(currentMemoIndex >= 0) db.memo[currentMemoIndex].text = text;
        else db.memo.push({text});
        saveToStorage('memo');
        cancelMemo();
        renderMemo();
    }
    function delMemo(index, event) {
        event.stopPropagation();
        db.memo.splice(index, 1);
        saveToStorage('memo');
        renderMemo();
    }
    function renderMemo() {
        document.getElementById('memo-list').innerHTML = db.memo.map((item, i) => {
            const title = item.text.split('\n')[0].substring(0, 25) || "無標題";
            return `
                <div class="list-item" style="cursor:pointer;" onclick="showMemoEditor(${i})">
                    <span>📝 ${title}...</span>
                    <button class="delete-btn" onclick="delMemo(${i}, event)">×</button>
                </div>
            `;
        }).join('');
    }

    function renderAll() { renderCal(); renderAddr(); renderTodo(); renderMemo(); }

    // --- 本地端 HotSync 備份 ---
    function exportLocal() {
        const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(db, null, 2));
        const downloadAnchor = document.createElement('a');
        downloadAnchor.setAttribute("href", dataStr);
        downloadAnchor.setAttribute("download", "palm_os_fullscreen_large_backup.json");
        document.body.appendChild(downloadAnchor);
        downloadAnchor.click();
        downloadAnchor.remove();
    }
    function triggerImport() { document.getElementById('import-file').click(); }
    function importLocal(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                const importedData = JSON.parse(e.target.result);
                if (importedData.cal && importedData.addr && importedData.todo && importedData.memo) {
                    db = importedData;
                    updateAllStorage();
                    renderAll();
                    alert("資料成功匯入！");
                }
            } catch (err) { alert("讀取失敗，請確認檔案格式。"); }
        };
        reader.readAsText(file);
    }

    // --- Google Drive 雲端 HotSync 同步 ---
    window.onload = function () {
        try {
            tokenClient = google.accounts.oauth2.initTokenClient({
                client_id: CLIENT_ID,
                scope: SCOPES,
                callback: (tokenResponse) => {
                    if (tokenResponse && tokenResponse.access_token) {
                        accessToken = tokenResponse.access_token;
                        document.getElementById('sync-status').innerText = "狀態: 雲端授權成功！";
                        document.getElementById('sync-status').style.color = "green";
                        document.getElementById('up-btn').disabled = false;
                        document.getElementById('down-btn').disabled = false;
                        document.getElementById('auth-btn').innerText = "已連線";
                    }
                },
            });
        } catch(e) {
            document.getElementById('sync-status').innerText = "狀態: 雲端 SDK 載入失敗";
        }
        goHome();
    };

    function handleAuth() { tokenClient.requestAccessToken({ prompt: 'consent' }); }
    async function findBackupFile() {
        const response = await fetch(`https://www.googleapis.com/drive/v3/files?q=name='palm_os_backup.json' and trashed=false`, {
            headers: { 'Authorization': `Bearer ${accessToken}` }
        });
        const result = await response.json();
        return result.files && result.files.length > 0 ? result.files[0].id : null;
    }

    async function uploadToDrive() {
        if (!accessToken) return alert("請先登入");
        document.getElementById('sync-status').innerText = "上傳中...";
        try {
            const fileId = await findBackupFile();
            const boundary = 'foo_bar_baz';
            const metadata = { name: 'palm_os_backup.json', mimeType: 'application/json' };
            let url = 'https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart';
            let method = 'POST';
            if (fileId) { url = `https://www.googleapis.com/upload/drive/v3/files/${fileId}?uploadType=multipart`; method = 'PATCH'; }

            const multipartRequestBody = `\r\n--${boundary}\r\nContent-Type: application/json; charset=UTF-8\r\n\r\n${JSON.stringify(metadata)}\r\n--${boundary}\r\nContent-Type: application/json\r\n\r\n${JSON.stringify(db)}\r\n--${boundary}--`;
            const response = await fetch(url, { method: method, headers: { 'Authorization': `Bearer ${accessToken}`, 'Content-Type': `multipart/related; boundary=${boundary}` }, body: multipartRequestBody });
            if (response.ok) { document.getElementById('sync-status').innerText = "備份完成！"; alert("已同步至雲端硬碟。"); }
        } catch (err) { document.getElementById('sync-status').innerText = "同步失敗。"; }
    }

    async function downloadFromDrive() {
        if (!accessToken) return alert("請先登入");
        document.getElementById('sync-status').innerText = "檢查下載中...";
        try {
            const fileId = await findBackupFile();
            if (!fileId) return alert("找不到雲端備份檔。");
            const response = await fetch(`https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`, { headers: { 'Authorization': `Bearer ${accessToken}` } });
            const cloudData = await response.json();
            if (cloudData.cal) { db = cloudData; updateAllStorage(); renderAll(); document.getElementById('sync-status').innerText = "還原完成！"; alert("雲端資料已同步回本地。"); }
        } catch (err) { document.getElementById('sync-status').innerText = "下載失敗。"; }
    }

    renderAll();
</script>
